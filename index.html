  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var isInIframe = (function() { try { return window.self !== window.top; } catch(e) { return true; } })();
        var isPreview = window.location.hostname.includes('id-preview--') || window.location.hostname.includes('lovableproject.com');
        if (isPreview || isInIframe) {
          navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(reg) { reg.unregister(); }); });
        } else {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
              .catch(function(err) { console.log('[SW] Registration failed:', err); });
          });
        }
      }
    </script>
